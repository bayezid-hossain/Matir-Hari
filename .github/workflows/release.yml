name: Mobile App Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v1.0.0, v2.1.3, etc.

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Install App Dependencies
        working-directory: app
        run: npm install
        
      - name: Create google-services.json
        working-directory: app
        env: 
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "✅ Created google-services.json from secrets"
          else
            echo "⚠️ GOOGLE_SERVICES_JSON secret not found. Skipping."
          fi
          
      - name: Prebuild Expo Project
        working-directory: app
        env:
          EXPO_PUBLIC_API_MODE: production
          NODE_ENV: production
        run: npx expo prebuild --platform android --no-install
        
      - name: Make Gradle Executable
        working-directory: app/android
        run: chmod +x gradlew
        
      - name: Build APK Release
        working-directory: app/android
        env:
          EXPO_PUBLIC_API_MODE: production
          NODE_ENV: production
        run: ./gradlew assembleRelease
        
      - name: Build AAB Release (Play Store)
        working-directory: app/android
        env:
          EXPO_PUBLIC_API_MODE: production
          NODE_ENV: production
        run: ./gradlew bundleRelease
        
      - name: Extract Release Notes
        id: release_notes
        working-directory: app
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            const changelogPath = 'CHANGELOG.md';
            let notes = 'Bug fixes and performance improvements.';
            
            if (fs.existsSync(changelogPath)) {
                const changelog = fs.readFileSync(changelogPath, 'utf8');
                const escapeRegex = (s) => s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\\\$&');
                const match = changelog.match(new RegExp('## \\\[' + escapeRegex(version) + '\\\].*?\\n([\\\\s\\\\S]*?)(?=\\n## |$)', 'i'));
                if (match && match[1].trim()) {
                    notes = match[1].trim();
                }
            }
            fs.writeFileSync('../RELEASE_NOTES.txt', notes);
          "
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/android/app/build/outputs/apk/release/app-release.apk
            app/android/app/build/outputs/bundle/release/app-release.aab
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
