            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6">
<!-- Top Branding Anchor -->
<header class="mb-12 text-center">
<div class="inline-flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">local_florist</span>
</div>
<h1 class="text-4xl font-headline font-extrabold tracking-tighter text-primary">Matir Hari</h1>
<p class="font-label text-xs uppercase tracking-[0.15em] text-secondary mt-2">Authentic Bengali Heritage</p>
</header>
<!-- Login Card -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-3xl p-8 shadow-[0_12px_32px_rgba(144,45,19,0.06)] border border-outline-variant/10">
<div class="mb-8">
<h2 class="text-2xl font-headline font-bold text-on-surface mb-2">Welcome Back</h2>
<p class="text-on-surface-variant text-sm">Enter your credentials to access your heirloom recipes and orders.</p>
</div>
<form class="space-y-6">
<!-- Phone Field -->
<div class="space-y-2">
<label class="font-label text-[11px] font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="phone">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">call</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-high rounded-xl border-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/60 transition-all" id="phone" name="phone" placeholder="+880 1XXX-XXXXXX" type="tel"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-[11px] font-bold uppercase tracking-wider text-on-surface-variant" for="password">Password</label>
<a class="text-[11px] font-bold uppercase tracking-wider text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-high rounded-xl border-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/60 transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Primary Login Action -->
<button class="w-full h-14 bg-kiln-gradient text-on-primary font-headline font-bold rounded-xl shadow-[0_8px_16px_rgba(144,45,19,0.2)] active:scale-95 transition-all duration-200 mt-4 flex items-center justify-center gap-2" type="submit">
                Login
                <span class="material-symbols-outlined text-xl">arrow_right_alt</span>
</button>
</form>
<!-- Social/Alternative Login Divider -->
<div class="relative my-8 text-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<span class="relative px-4 text-xs font-label uppercase tracking-widest text-outline bg-surface-container-lowest">Or continue with</span>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="h-12 flex items-center justify-center gap-2 bg-surface-container rounded-xl hover:bg-surface-container-high transition-colors text-on-surface-variant font-medium text-sm">
<span class="material-symbols-outlined text-lg">google</span>
                Google
            </button>
<button class="h-12 flex items-center justify-center gap-2 bg-surface-container rounded-xl hover:bg-surface-container-high transition-colors text-on-surface-variant font-medium text-sm">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">social_leaderboard</span>
                Facebook
            </button>
</div>
</main>
<!-- Secondary Signup Footer -->
<footer class="mt-8 text-center">
<p class="text-on-surface-variant text-sm">
            Don't have an account yet? 
            <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Create Account</a>
</p>
</footer>
<!-- Decorative Element -->
<div class="fixed bottom-0 right-0 p-8 opacity-20 pointer-events-none hidden lg:block">
<img alt="Matir Hari Decorative" class="w-64 h-64 grayscale contrast-125" data-alt="Detailed close-up of a handcrafted terracotta pot with intricate traditional Bengali floral patterns and earthy textures" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBBu5KRnSnTcU5sCXjcozqRWp-57G6oT47kSCaLuoN9C6DC9bCpMS2uQ_RbJDiEMpSKCJfpG1SkLSKpqM1GL2R2xyW_6xGmMG20dCUvrX596cfoqcZSFVrACYI4EyYBxddSiPMgnUdi696r7YyCgcrnvIdYMxJugbxiR0mZzD4p-PvoNjFQkBT7iT2_vUFXoMR8shOt-hfkTlD8v8Hq61bfs91fO2Vao5gfh6SGIgm8p6gSKlTbvTt_gWqDHXIZ74k0TiIMkG4aHG4"/>
